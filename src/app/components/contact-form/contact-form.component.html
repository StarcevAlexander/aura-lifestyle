<div class="form-modal">

  @if (formSubmitted()) {
    <div class="text-center py-5">
      <button type="button" class="btn-close-modal" (click)="close()" aria-label="Close">✕</button>
      <div class="success-icon-wrap mb-3">
        <i class="bi bi-check2-circle"></i>
      </div>
      <h3 class="modal-title-text mt-2 mb-2">{{ t().successTitle }}</h3>
      <p class="modal-sub mb-4">{{ t().successText }}</p>
      <button type="button" class="btn-outline-gold" (click)="close()">{{ t().ok }}</button>
    </div>

  } @else {

    <form (ngSubmit)="onSubmit()" #contactForm="ngForm" class="position-relative">
      <button type="button" class="btn-close-modal" (click)="close()" aria-label="Close">✕</button>

      <div class="text-center mb-4">
        <h2 class="modal-title-text">AMANI</h2>
      </div>

      <div class="mb-3">
        <label for="contactName" class="form-label-custom">{{ t().nameLabel }}</label>
        <input
          type="text"
          class="form-control-modal"
          id="contactName"
          name="contactName"
          [ngModel]="name()" (ngModelChange)="name.set($event)"
          [placeholder]="t().namePlaceholder"
          required
        />
      </div>

      <div class="mb-3">
        <label for="phoneNumber" class="form-label-custom">{{ t().phoneLabel }}</label>
        <input
          type="tel"
          inputmode="tel"
          class="form-control-modal"
          id="phoneNumber"
          name="phoneNumber"
          [ngModel]="phoneNumber()" (ngModelChange)="phoneNumber.set($event)"
          [placeholder]="t().phonePlaceholder"
          required
          (input)="onPhoneInput($event)"
          (keypress)="onPhoneKeyPress($event)"
        />
      </div>

      <div class="mb-4">
        <label for="contactMessage" class="form-label-custom">{{ t().messageLabel }}</label>
        <textarea
          class="form-control-modal"
          id="contactMessage"
          name="contactMessage"
          [ngModel]="message()" (ngModelChange)="message.set($event)"
          [placeholder]="t().messagePlaceholder"
          rows="3"
        ></textarea>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading()">
        @if (!isLoading()) {
          <span>{{ t().submit }}</span>
        } @else {
          <span>
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            {{ t().sending }}
          </span>
        }
      </button>

      @if (errorMessage()) {
        <div class="error-alert mt-3" role="alert">
          {{ errorMessage() }}
        </div>
      }

    </form>
  }

</div>
